# Local PostgreSQL for migrate / seed / curriculum verify / Playwright (optional).
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_training_portal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_training_portal"]
      interval: 3s
      timeout: 5s
      retries: 10
