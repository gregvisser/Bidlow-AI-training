# Staging deploy — targets the Web App and secrets in GitHub Environment "staging".
# Does NOT run database migrations. After deploy, run: npx prisma migrate deploy (against staging DB).
# Azure App Service Application settings must still hold full runtime configuration.
#
# Deploy uses workload identity federation (OIDC) + `az webapp deploy`, because
# `azure/webapps-deploy` with a publish profile fails ARM "get app runtime OS" validation on this Linux app.
# Required staging secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# Setup: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure

name: Deploy Azure App Service (staging)

on:
  workflow_dispatch:
  push:
    branches: [staging]

concurrency:
  group: deploy-azure-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    # Build needs the same secrets as deploy; environment-scoped secrets are only visible when the job sets `environment`.
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint & typecheck & test
        run: npm run lint && npm run typecheck && npm run test

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}

      - name: Stage standalone output
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Zip standalone bundle
        run: (cd .next/standalone && zip -r ../../release.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-standalone-staging
          path: release.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: next-standalone-staging

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (staging)
        run: |
          az webapp deploy \
            --resource-group rg-bidlow-ai-training-staging \
            --name bidlow-ai-training-staging \
            --src-path release.zip \
            --type zip \
            --async false
