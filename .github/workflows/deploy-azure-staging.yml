# Staging deploy — targets the Web App and secrets in GitHub Environment "staging".
# Does NOT run database migrations. After deploy, run: npx prisma migrate deploy (against staging DB).
# Azure App Service Application settings must still hold full runtime configuration.

name: Deploy Azure App Service (staging)

on:
  workflow_dispatch:
  push:
    branches: [staging]

concurrency:
  group: deploy-azure-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    # Build needs the same secrets as deploy; environment-scoped secrets are only visible when the job sets `environment`.
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint & typecheck & test
        run: npm run lint && npm run typecheck && npm run test

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}

      - name: Stage standalone output
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Zip standalone bundle
        run: (cd .next/standalone && zip -r ../../release.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-standalone-staging
          path: release.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: next-standalone-staging

      - name: Unzip
        run: unzip release.zip -d deploy

      # Kudu zip deploy uses the same publish profile as MSDeploy but avoids azure/webapps-deploy
      # validation failures ("Failed to get app runtime OS" / invalid profile) seen with Linux + publish profile.
      - name: Zip for Kudu
        run: (cd deploy && zip -r ../kudu-deploy.zip .)

      - name: Deploy to Azure Web App (staging) via Kudu zip
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 << 'EOF'
          import base64
          import os
          import ssl
          import urllib.error
          import urllib.request
          import xml.etree.ElementTree as ET

          xml = os.environ["PUBLISH_PROFILE"].strip()
          if xml.startswith("\ufeff"):
              xml = xml.lstrip("\ufeff")

          root = ET.fromstring(xml)
          ms = None
          for el in root.iter():
              if el.tag.split("}")[-1] != "publishProfile":
                  continue
              if el.get("publishMethod") == "MSDeploy":
                  ms = el
                  break
          if ms is None:
              raise SystemExit("No MSDeploy publishProfile in AZURE_WEBAPP_PUBLISH_PROFILE")

          host = (ms.get("publishUrl") or "").split(":")[0].strip()
          user = (ms.get("userName") or "").strip()
          pwd = (ms.get("userPWD") or "").strip()
          if not host or not user or not pwd:
              raise SystemExit("Incomplete MSDeploy credentials in publish profile")

          url = f"https://{host}/api/zipdeploy"
          with open("kudu-deploy.zip", "rb") as f:
              body = f.read()

          req = urllib.request.Request(url, data=body, method="POST")
          token = base64.b64encode(f"{user}:{pwd}".encode()).decode()
          req.add_header("Authorization", f"Basic {token}")
          req.add_header("Content-Type", "application/zip")

          ctx = ssl.create_default_context()
          try:
              with urllib.request.urlopen(req, context=ctx, timeout=900) as resp:
                  print("kudu_zipdeploy_http_status", resp.getcode())
          except urllib.error.HTTPError as e:
              print("kudu_zipdeploy_http_error", e.code)
              raise
          EOF
