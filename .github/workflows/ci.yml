name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Minimal build-time env (no real secrets). DB not required for `next build`.
          AUTH_SECRET: ci-build-placeholder-at-least-32-chars-long
          AUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci_placeholder

  curriculum-proof:
    name: Curriculum proof (DB + verify + E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_training_portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_training_portal"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 25

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_training_portal
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_training_portal
      AUTH_SECRET: ci-curriculum-proof-secret-at-least-32-characters-long
      AUTH_URL: http://127.0.0.1:3000
      APP_BASE_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres (TCP)
        run: |
          echo "Waiting for Postgres on localhost:5432..."
          for i in $(seq 1 40); do
            if python3 -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1',5432)); s.close()" 2>/dev/null; then
              echo "Postgres port is open."
              exit 0
            fi
            echo "  attempt $i/40 ..."
            sleep 2
          done
          echo "::error::Postgres did not accept connections in time"
          exit 1

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: |
          echo "::group::prisma migrate deploy"
          npx prisma migrate deploy
          echo "::endgroup::"

      - name: Seed database (users + launch curriculum sync)
        run: |
          echo "::group::db:seed"
          npm run db:seed
          echo "::endgroup::"

      - name: Backfill enrollment completion (idempotent)
        run: |
          echo "::group::db:backfill-enrollment"
          npm run db:backfill-enrollment
          echo "::endgroup::"

      - name: Curriculum verify
        run: |
          echo "::group::curriculum:verify"
          npm run curriculum:verify
          echo "::endgroup::"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        run: |
          echo "::group::playwright install"
          npx playwright install --with-deps chromium
          echo "::endgroup::"

      - name: Playwright — curriculum + certificate proof
        run: |
          echo "::group::playwright test"
          npx playwright test e2e/launch-curriculum.spec.ts e2e/certificate-completion.spec.ts e2e/admin-certificates.spec.ts e2e/completion-analytics.spec.ts e2e/admin-stale-enrollments.spec.ts
          echo "::endgroup::"
